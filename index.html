<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع صور الطلاب</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        max-width: 500px;
        margin: 50px auto;
        padding: 20px;
        background: #f5f7fa;
        direction: rtl;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      h1 {
        color: #1a73e8;
        text-align: center;
        border-bottom: 3px solid #1a73e8;
        padding-bottom: 10px;
      }
      label {
        display: block;
        margin: 15px 0 5px;
        font-weight: bold;
        color: #333;
      }
      input[type="text"], input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        transition: background 0.3s;
      }
      button:hover {
        background: #1557b0;
      }
      #status {
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        display: none;
      }
      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block !important;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block !important;
      }
      .note {
        margin-top: 20px;
        font-size: 14px;
        color: #666;
        text-align: center;
        border-top: 1px solid #eee;
        padding-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📚 رفع صور الطلاب</h1>
      
      <label for="studentName">👤 اسم الطالب:</label>
      <input type="text" id="studentName" placeholder="أدخل اسم الطالب" required>
      
      <label for="fileInput">🖼️ اختر صورة الطالب:</label>
      <input type="file" id="fileInput" accept="image/*" required>
      
      <button onclick="uploadFile()">🚀 رفع الصورة</button>
      
      <div id="status"></div>
      <div class="note">سيتم حفظ الصورة في جوجل درايف باسم الطالب</div>
    </div>

    <script>
      function uploadFile() {
        var studentName = document.getElementById('studentName').value.trim();
        var fileInput = document.getElementById('fileInput');
        var statusDiv = document.getElementById('status');
        
        // التحقق من المدخلات
        if (!studentName) {
          statusDiv.className = 'error';
          statusDiv.textContent = '⚠️ الرجاء إدخال اسم الطالب';
          statusDiv.style.display = 'block';
          return;
        }
        
        if (!fileInput.files || fileInput.files.length === 0) {
          statusDiv.className = 'error';
          statusDiv.textContent = '⚠️ الرجاء اختيار صورة';
          statusDiv.style.display = 'block';
          return;
        }
        
        var file = fileInput.files[0];
        
        // التحقق من حجم الصورة (أقل من 10 ميجابايت)
        if (file.size > 10 * 1024 * 1024) {
          statusDiv.className = 'error';
          statusDiv.textContent = '⚠️ حجم الصورة كبير جداً (الحد الأقصى 10 ميجابايت)';
          statusDiv.style.display = 'block';
          return;
        }
        
        // تعطيل الزر لمنع الضغط المتكرر
        document.querySelector('button').disabled = true;
        document.querySelector('button').textContent = '⏳ جاري الرفع...';
        
        statusDiv.className = '';
        statusDiv.style.display = 'block';
        statusDiv.textContent = '⏳ جاري رفع الصورة...';
        
        // قراءة الملف وتحويله
        var reader = new FileReader();
        reader.onload = function(e) {
          var fileData = e.target.result.split(',')[1]; // استخراج البيانات base64
          
          // استدعاء الدالة في الخادم
          google.script.run
            .withSuccessHandler(function(response) {
              statusDiv.className = 'success';
              statusDiv.textContent = response;
              document.querySelector('button').disabled = false;
              document.querySelector('button').textContent = '🚀 رفع الصورة';
              document.getElementById('studentName').value = '';
              document.getElementById('fileInput').value = '';
            })
            .withFailureHandler(function(error) {
              statusDiv.className = 'error';
              statusDiv.textContent = '❌ حدث خطأ: ' + error.message;
              document.querySelector('button').disabled = false;
              document.querySelector('button').textContent = '🚀 رفع الصورة';
            })
            .uploadFileToDrive(fileData, file.name, studentName);
        };
        
        reader.readAsDataURL(file);
      }
    </script>
  </body>
</html>
