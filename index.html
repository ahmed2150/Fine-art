<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تسجيل الفنانين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1e1b4b, #000); min-height: 100vh; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .input-dark { background: rgba(0,0,0,0.3); border: 1px solid #334155; transition: all 0.3s; }
        .input-dark:focus { border-color: #8b5cf6; outline: none; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
        input[type="checkbox"] + span { padding: 12px 20px; font-size: 1rem; border-width: 2px; }
        input[type="checkbox"]:checked + span { border-color: #8b5cf6 !important; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-4xl mx-auto glass p-6 md:p-10 rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-8 text-violet-400">منصة تسجيل الفنانين</h1>
        
        <div id="replyBox" class="hidden mb-8 p-6 bg-violet-900/30 border-2 border-violet-500/50 rounded-2xl">
            <h2 class="text-xl font-bold text-violet-300 mb-2">رد الإدارة:</h2>
            <p id="replyContent" class="text-white text-lg"></p>
        </div>

        <form id="regForm" class="space-y-8">
            <!-- ... existing code: inputs ... -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" name="fullName" id="fullName" placeholder="الاسم الرباعي" required class="w-full px-5 py-3 rounded-xl input-dark">
                <input type="tel" name="phone" id="phone" placeholder="رقم الهاتف" required class="w-full px-5 py-3 rounded-xl input-dark">
                <input type="text" name="nationalId" id="nationalId" placeholder="الرقم القومي (14 رقم)" required class="w-full px-5 py-3 rounded-xl input-dark">
                <select name="grade" id="grade" class="w-full px-5 py-3 rounded-xl input-dark"><option value="">الفرقة الدراسية</option><option>الأولى</option><option>الثانية</option><option>الثالثة</option><option>الرابعة</option></select>
            </div>
            
            <div id="dynamicSections" class="space-y-6"></div>
            
            <!-- ... existing code: other selects ... -->
            
            <div class="space-y-4">
                <label class="block text-lg text-violet-300 font-bold">إضافة صور الأعمال الفنية (اختر من 2 إلى 12 صورة)</label>
                <div id="imageInputs" class="grid grid-cols-3 md:grid-cols-6 gap-3"></div>
            </div>
            
            <textarea name="notes" id="notes" placeholder="ملاحظات..." class="w-full px-5 py-4 rounded-xl input-dark h-24"></textarea>
            <button type="submit" id="submitBtn" class="w-full py-4 rounded-xl bg-violet-600 hover:bg-violet-700 font-bold transition-all text-white text-lg shadow-lg">إرسال البيانات</button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; 
        
        async function checkStatus(id) {
            const res = await fetch(`${SCRIPT_URL}?nationalId=${id}`);
            const result = await res.json();
            const box = document.getElementById('replyBox');
            if(result.status === "success" && result.data && result.data.reply) {
                document.getElementById('replyContent').innerText = result.data.reply;
                box.classList.remove('hidden');
            } else {
                box.classList.add('hidden');
            }
        }

        document.getElementById('nationalId').addEventListener('blur', (e) => {
            if(e.target.value.length === 14) checkStatus(e.target.value);
        });

        // ... existing code: initialization and form handling ...
        const config = [{name: 'materials', label: 'نوع الخامات', items: ['رصاص', 'فحم', 'اكريلك', 'زيت', 'جواش', 'سوفت باستيل', 'حبر', 'ألوان خشب', 'ماركر']}, {name: 'styles', label: 'نوع الرسم', items: ['تجريدي', 'سيريالي', 'تقليدي', 'واقعي', 'بورتريه', 'كاريكاتير', 'بوب ارت', 'كلاسيكي', 'فانتازيا', 'تعبيري', 'مينيمال']}, {name: 'talents', label: 'نوع الموهبة', items: ['رسم', 'نحت', 'حفر', 'تطريز', 'خزف وفخار', 'موازييك', 'ديكوباج', 'تصوير فوتوغرافي', 'حرق على الخشب', 'تشكيل ورقي', 'ريزن ارت', 'اشغال يدوي', 'هجرافيك', 'خط عربي', 'تشكيل النحاس']}];
        config.forEach(s => {
            const container = document.createElement('div');
            container.innerHTML = `<label class="text-violet-300 font-bold text-lg mb-3 block">${s.label}</label><div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3" id="${s.name}"></div>`;
            document.getElementById('dynamicSections').appendChild(container);
            s.items.forEach(i => {
                document.getElementById(s.name).innerHTML += `<label class="cursor-pointer"><input type="checkbox" name="${s.name}" value="${i}" class="hidden peer"><span class="block px-4 py-3 text-center rounded-xl border border-slate-700 bg-slate-800 text-slate-300 peer-checked:bg-violet-600 peer-checked:text-white peer-checked:border-violet-500 transition-all duration-200">${i}</span></label>`;
            });
        });

        for(let i=0; i<12; i++) { document.getElementById('imageInputs').innerHTML += `<input type="file" id="f${i}" class="hidden" accept="image/*"><label for="f${i}" class="h-20 bg-slate-800 rounded-xl flex items-center justify-center border-dashed border-2 border-slate-600 cursor-pointer hover:border-violet-500 transition-all">+</label>`; }

        const form = document.getElementById('regForm');
        form.addEventListener('input', () => { localStorage.setItem('artData', JSON.stringify(Object.fromEntries(new FormData(form)))); });
        window.onload = () => { const saved = JSON.parse(localStorage.getItem('artData')); if(saved) for(let k in saved) { const el = form.elements[k]; if(el && el.type !== 'checkbox') el.value = saved[k]; if(saved.nationalId) checkStatus(saved.nationalId); } };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري الإرسال...";
            const formData = new FormData(form);
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
            const result = await response.json();
            if(result.status === "success") {
                alert("تم التسجيل/التحديث بنجاح!");
                localStorage.removeItem('artData');
                form.reset();
            }
            btn.innerText = "إرسال البيانات";
        };
    </script>
</body>
</html>
